{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signed Out</title>
    <link rel="stylesheet" href="{% static 'accounts/auth-ui.css' %}">
</head>
<body>
    <header class="site-header">
        <div class="header-main">
            <a href="/" class="brand">shop<span>lane</span></a>
            <div class="location-block">
                <span class="header-label">Signed out</span>
                <strong>Your browser token was removed</strong>
            </div>
            <div class="search-shell search-shell-static">
                <input type="text" value="Sign in again to access protected pages" aria-label="Logout summary" readonly>
                <button type="button" disabled>Logout</button>
            </div>
            <nav class="header-links">
                <a href="/products/ui/">Products</a>
                <a href="/orders/ui/">Orders</a>
                <a href="/login/">Sign in</a>
            </nav>
            <div class="account-block">
                <span class="header-label">Session</span>
                <strong>Cleared</strong>
            </div>
        </div>
    </header>

    <main class="page-shell">
        <section class="single-panel">
            <div class="section-heading">
                <div>
                    <p class="section-label">Signed out</p>
                    <h2>Your browser session has been cleared</h2>
                </div>
            </div>
            <p class="lead">Products and orders will ask you to sign in again before protected actions can run.</p>
            <div class="hero-actions">
                <a class="btn" href="/login/">Sign in again</a>
                <a class="btn btn-secondary" href="/">Back to home</a>
            </div>
        </section>
    </main>

    <script src="{% static 'accounts/auth-ui.js' %}"></script>
</body>
</html>
